<!DOCTYPE html><html><head><meta charset="UTF-8"><title>JS Check</title></head><body>
<h1>Syntax Check</h1>
<div id="result"></div>
<script>
window.onerror = function(msg, url, line, col, err) {
    document.getElementById('result').innerHTML = '<p style="color:red">Error: ' + msg + '<br>Line: ' + line + '<br>Col: ' + col + '</p>';
    return true;
};
</script>
<script src="app.js" onerror="document.getElementById('result').innerHTML='<p style=color:red>Script load failed</p>'"></script>
<div id="loaded">Script loaded OK</div>
<script>document.getElementById('loaded').innerText = 'Script loaded and parsed OK';</script>
</body></html>
